<app-box [Title]="'Seasons'">
  <app-form (SubmitFunction)="setCurrentSeasonEvent()">
    <app-form-element-group [LabelText]="'Current Season & Event'" [InlineElements]="true">
      <div>
        <app-form-element [Type]="'select'" [LabelText]="'Season'" [SelectList]="seasons" [DisplayProperty]="'season'"
          [(Model)]="currentSeason" (ModelChange)="getEventsForCurrentSeason()" [FormGroupInline]="true"
          [MinWidth]="'100px'" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'select'" [LabelText]="'Event'" [SelectList]="eventList"
          [DisplayProperty]="'event_nm'" [(Model)]="currentEvent" [FormGroupInline]="true" [DisplayEmptyOption]="true"
          [MinWidth]="'100px'" [Required]="true">
        </app-form-element>

        @if (currentEvent && currentEvent.id) {
        <app-form-element [Type]="'checkbox'" [TrueValue]="'y'" [FalseValue]="'n'"
          [LabelText]="'Competition Page Active'" [(Model)]="currentEvent.competition_page_active"
          [FormGroupInline]="true">
        </app-form-element>
        }
      </div>

      <app-button-ribbon>
        <app-button [ButtonType]="'danger'" (FunctionCallBack)="resetSeasonForm()">Reset</app-button>

        @if (currentSeason.id) {
        <app-button [ButtonType]="'success'" [Type]="'submit'">Save
        </app-button>
        }
      </app-button-ribbon>
    </app-form-element-group>
  </app-form>

  <app-form-element-group [LabelText]="'Seasons'">
    <div class="flex flex-wrap space-between">
      <app-modal [ButtonType]="'main'" [ButtonText]="'Manage'" [Title]="'Manage Season'"
        [(Visible)]="manageSeasonModalVisible" [MaxWidth]="'450px'">
        <app-form (SubmitFunction)="saveSeason(season)">
          <app-form-element [Type]="'select'" [LabelText]="'Seasons'" [SelectList]="seasons" [DisplayEmptyOption]="true"
            [DisplayProperty]="'season'" [Model]="season" (ModelChange)="changeSeason($event)" [MinWidth]="'110px'">
          </app-form-element>

          <app-form-element [Type]="'number'" [LabelText]="'Season'" [Width]="'6em'" [(Model)]="season.season"
            [FormGroupInline]="true" [MinWidth]="'105px'" [Required]="true">
          </app-form-element>

          <app-form-element [Type]="'text'" [LabelText]="'Game'" [Width]="'100%'" [(Model)]="season.game"
            [FieldSize]="255" [Required]="true">
          </app-form-element>

          <app-form-element [Type]="'area'" [LabelText]="'Manual URL'" [Width]="'100%'" [Rows]="2"
            [(Model)]="season.manual" [FieldSize]="2000" [Required]="true">
          </app-form-element>


          <app-button-ribbon>
            @if (season.id) {
            <app-button [ButtonType]="'danger'" (FunctionCallBack)="deleteSeason()">Delete</app-button>
            }
            <app-button [ButtonType]="'success'" [Type]="'submit'">Save</app-button>
          </app-button-ribbon>

        </app-form>
      </app-modal>

      <app-modal [ButtonText]="'Users'" [Title]="'Manage Users for Season'" [MaxWidth]="'450px'">
        <app-table [TableCols]="userSeasonTableCols" [TableData]="users" [TriggerUpdate]="userSeasonTableUpdateTrigger"
          [EnableFilter]=" true" [ShowEditButton]="true" (EditRecordCallBack)="showUserSeasonModal($event)"
          [Scrollable]="true" [ScrollHeight]="'calc(100vh - 28rem)'">
        </app-table>

        <app-modal [Title]="'Manage User Seasons'" [(Visible)]="userSeasonModalVisible" [MaxWidth]="'500px'">
          <app-form (SubmitFunction)="saveUserSeasons()">
            <app-form-element-group [LabelText]="'User'" [InlineElements]="true">
              <p>{{ activeUser.name }}</p>
            </app-form-element-group>

            <app-form-element-group [LabelText]="'Linked Seasons'">
              <div class="flex align-items-center">
                <app-form-element [Type]="'select'" [LabelText]="'Season'" [SelectList]="activeUserAvailableSeasons"
                  [DisplayProperty]="'season'" [FormGroupInline]="true" [(Model)]="selectedSeasonToAdd"
                  [DisplayEmptyOption]="true" [MinWidth]="'100px'">
                </app-form-element>

                <div class="padding-bottom-2rem">
                  <app-button [ButtonType]="'add'" (FunctionCallBack)="addSeasonToActiveUser()"></app-button>
                </div>
              </div>

              <app-table [TableCols]="activeUserSeasonTableCols" [TableData]="activeUserSeasons"
                [ShowRemoveButton]="true" (RemoveRecordCallBack)="removeSeasonFromActiveUser($event)" [Width]="'100%'">
              </app-table>
            </app-form-element-group>

            <app-button-ribbon>
              <app-button [ButtonType]="'success'" [Type]="'submit'">Save</app-button>
            </app-button-ribbon>
          </app-form>
        </app-modal>
      </app-modal>

      @if (currentSeason.id) {
      <app-button [ButtonType]="'main'" (FunctionCallBack)="syncSeason()">
        Sync Season
      </app-button>
      }
    </div>
  </app-form-element-group>

  <app-manage-event [seasons]="seasons" [currentSeason]="currentSeason" [currentEvent]="currentEvent"
    (refreshRequested)="init()">
  </app-manage-event>

  <app-manage-team [seasons]="seasons" [teams]="teams" (refreshRequested)="init()">
  </app-manage-team>

  <app-manage-match [seasons]="seasons" [currentEvent]="currentEvent" (refreshRequested)="init()">
  </app-manage-match>

  @if (syncSeasonResponse.retMessage) {
  <app-form-element-group [LabelText]="'Season Response'">
    <div id="respose">
      <p class="white-space-pre">{{ syncSeasonResponse.retMessage }}</p>
    </div>
  </app-form-element-group>
  }
</app-box>
