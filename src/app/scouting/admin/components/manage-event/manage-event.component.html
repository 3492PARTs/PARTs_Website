<app-form-element-group [LabelText]="'Events'">
  <div class="flex flex-wrap space-between">
    <app-modal [ButtonType]="'main'" [ButtonText]="'Manage'" [Title]="'Manage Event'"
      [(Visible)]="manageEventsModalVisible" [MaxWidth]="'500px'">
      <app-form (SubmitFunction)="saveEvent()">
        <app-form-element [Type]="'radio'" [LabelText]="'Input Type'" [SelectList]="inputOptions"
          [(Model)]="inputOption" [DisplayProperty]="'property'" [BindingProperty]="'value'"></app-form-element>

        @if (inputOption === 'tba') {
        <app-form-element [Type]="'text'" [LabelText]="'TBA Event Code'" [(Model)]="event.event_cd">
        </app-form-element>
        }
        @else if (inputOption === 'form') {
        <app-form-element [Type]="'select'" [LabelText]="'Season'" [SelectList]="seasons" [DisplayEmptyOption]="true"
          [DisplayProperty]="'season'" [BindingProperty]="'id'" [(Model)]="event.season_id" [Required]="true"
          (FunctionCallBack)="getEventsForSeason()">
        </app-form-element>

        <app-form-element [Type]="'select'" [LabelText]="'Events'" [SelectList]="events" [DisplayEmptyOption]="true"
          [DisplayProperty]="'event_nm'" [Model]="event" (ModelChange)="changeEvent($event)" [FormGroupInline]="true"
          [MinWidth]="'100px'">
        </app-form-element>


        <app-form-element [Type]="'text'" [LabelText]="'Name'" [(Model)]="event.event_nm" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'date'" [LabelText]="'Date Start'" [(Model)]="event.date_st" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'date'" [LabelText]="'Date End'" [(Model)]="event.date_end" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Address'" [(Model)]="event.address" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'City'" [(Model)]="event.city" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'State'" [(Model)]="event.state_prov" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Zip Code'" [(Model)]="event.postal_code" [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Location Name'" [(Model)]="event.location_name"
          [Required]="true">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Event URL'" [(Model)]="event.event_url">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Google Maps URL'" [(Model)]="event.gmaps_url">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Webcast URL'" [(Model)]="event.webcast_url">
        </app-form-element>

        <app-form-element [Type]="'text'" [LabelText]="'Time Zone'" [(Model)]="event.timezone" [Required]="true">
        </app-form-element>
        }

        <app-button-ribbon>
          <app-button [ButtonType]="'warning'" (FunctionCallBack)="clearEvent()">Clear</app-button>
          <app-button [ButtonType]="'success'" [Type]="'submit'">Save</app-button>
        </app-button-ribbon>
      </app-form>
    </app-modal>

    @if (currentEvent.id) {
    <app-button [ButtonType]="'main'" (FunctionCallBack)="syncEvent(currentEvent.event_cd)">
      Sync Event
    </app-button>
    }

    @if (currentEvent.id) {
    <app-button [ButtonType]="'main'" (FunctionCallBack)="syncEventTeamInfo()">
      Sync Event-Team Info
    </app-button>
    }
  </div>
</app-form-element-group>

@if (syncEventResponse.retMessage) {
<app-form-element-group [LabelText]="'Event Response'">
  <div>
    <p class="white-space-pre">{{ syncEventResponse.retMessage }}</p>
  </div>
</app-form-element-group>
}
